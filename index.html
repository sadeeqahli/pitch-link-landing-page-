<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PitchLink - Elevate Your Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Updated Favicon to use the provided logo URL -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/9fBXRkS5/E82A553F-F39D-47C2-83D9-353369F353E0.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                DEFAULT: '#0BDA51', // Original App Theme Green
                dark: '#00A838',
                glow: '#0BDA51',
                black: '#050505',
                surface: '#0A0A0A',
                border: '#1A1A1A'
              }
            },
            animation: {
              'float-slow': 'float-slow 8s ease-in-out infinite',
              'glow-pulse': 'glow-pulse 4s ease-in-out infinite',
            },
            keyframes: {
              'float-slow': {
                '0%, 100%': { transform: 'translateY(0) scale(1)' },
                '50%': { transform: 'translateY(-10px) scale(1.02)' },
              },
              'glow-pulse': {
                '0%, 100%': { opacity: 0.3 },
                '50%': { opacity: 0.6 },
              }
            }
          },
        },
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }
      body {
        background-color: #050505;
        color: #F3F4F6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #1A1A1A;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0BDA51;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
